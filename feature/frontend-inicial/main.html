<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <title>Wikidev</title>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <div class="user-tag"><strong>usuario_dev</strong></div>
            
            <nav class="main-nav">
                <a href="#" class="active">Home</a>
                <a href="#">Forum</a>
                <a href="#">Manpages</a>
            </nav>
        </div>

        <div class="topbar-right">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Alternar Tema">☀️</button>
            
            <div class="menu-hamburger" onclick="toggleSidebar()" title="Recolher/Expandir Menu">≡</div>
        </div>
    </header>

    <div class="layout-container">
        
        <main class="main-content">
            <h2>Bem-vindo ao Wikidev</h2>
            <br>
            <p style="color: var(--text-secondary)">Selecione um tópico na barra lateral para começar a ler ou editar.</p>
        </main>

        <aside class="sidebar" id="sidebar">
            <ul class="file-tree">
                <li><div class="folder-item">Pasta_1</div></li>
                <li><div class="folder-item">Pasta_2</div></li>
                <li><div class="folder-item">Pasta_3</div></li>
                <li><div class="folder-item">Pasta_4</div></li>
            </ul>
        </aside>

    </div>

</body>
</html>
