<form
    id="page-editor"
    class="page-editor"
    hx-post="/pages/"
    hx-target="#page-editor-container"
    hx-swap="innerHTML"
>
    <div class="editor-top">
        <input
            class="page-title"
            name="title"
            placeholder="Título da página"
            required
        >

        <button type="button" class="settings-button" onclick="togglePageSettings()">
            Configurações
        </button>
    </div>

    <div id="page-settings" class="page-settings hidden">
        <input name="summary" placeholder="Resumo">

        <select name="page_type">
            <option value="personal">Personal</option>
            <option value="official">Official</option>
            <option value="question">Question</option>
            <option value="example">Example</option>
            <option value="note">Note</option>
        </select>

        <select name="status">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
            <option value="archived">Archived</option>
        </select>

        <input name="tag_ids" placeholder="Tags">
    </div>

    <textarea
        class="page-content"
        name="content"
        placeholder="Escreva sua página aqui..."
    ></textarea>

    <button type="submit" class="save-page-button"> Salvar </button>            

</form>
