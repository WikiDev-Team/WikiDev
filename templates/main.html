<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>WikiDev</title>

    <link rel="icon" type="image/png" href="/static/wikidev_logo.png">

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="/static/theme.js"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header class="topbar">
        <div class="topbar-left">
            <a href="/profile" class="botao-user">
                {{ usuario.display_name or usuario.username }}
            </a>

            <nav class="main-nav">
                <a href="/dashboard" class="active">Home</a>
                <a href="#">Forum</a>
                <a href="#">Manpages</a>
            </nav>
        </div>

        <div class="topbar-right">
            <a href="/dashboard" class="topbar-logo-link" aria-label="Página inicial do WikiDev">
                <img
                    src="/static/wikidev_logo.png"
                    alt="Logo do WikiDev"
                    class="topbar-logo"
                >
            </a>

            <button type="button" class="theme-toggle" aria-label="Alternar tema">
                ☀️
            </button>

            <button
                type="button"
                class="menu-hamburger"
                aria-label="Abrir ou fechar barra lateral"
                onclick="toggleSidebar()"
            >
                ≡
            </button>
        </div>
    </header>

    <div class="layout-container">
        <main class="main-content">
            <section id="welcome-panel" class="welcome-section">
                <h1>Bem-vindo ao Wikidev</h1>
                <p>Selecione um tópico na barra lateral para começar a ler ou editar.</p>
            </section>

            <div id="page-editor-container"></div>
        </main>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-actions">
                <button
                    type="button"
                    class="add-page-button"
                    onclick="showPageEditor()"
                    hx-get="/pages/new"
                    hx-target="#page-editor-container"
                    hx-swap="innerHTML"
                >
                    + Adicionar página
                </button>
            </div>

            <ul class="file-tree" id="pages-list"></ul>
        </aside>
    </div>

        <!-- O container principal precisa ter 'position: relative' -->
    <div id="search-container" style="position: relative; width: 100%; max-width: 400px;">
        
        <!-- Input do HTMX -->
        <input 
            type="search" 
            name="q" 
            placeholder="Buscar usuários ou páginas..."
            autocomplete="off"
            style="width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px;"
            hx-get="/busca" 
            hx-trigger="input changed delay:500ms, search" 
            hx-target="#search-results" 
        >

        <!-- Dropdown Flutuante de Resultados -->
        <!-- Ele inicia vazio. A classe pseudo-seletora (se usar Tailwind) ou CSS fará ele sumir quando vazio -->
        <div 
            id="search-results" 
            style="position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: white; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 50;"
        ></div>
    </div>

    <script>
        // Fecha os resultados da busca ao clicar fora do componente
        document.addEventListener('click', function(event) {
            const container = document.getElementById('search-container');
            const results = document.getElementById('search-results');
            
            // Se o clique não foi dentro do container de busca, esvaziamos a div de resultados
            if (container && !container.contains(event.target)) {
                results.innerHTML = '';
            }
        });
    </script>

</body>
</html>
