<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>WikiDev</title>

    <link rel="icon" type="image/png" href="/static/wikidev_logo.png">

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="/static/theme.js"></script>

    <link rel="stylesheet" href="/static/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
</head>

<body>
    <header class="topbar">
        <div class="topbar-left">
            <a href="/profile" class="botao-user">
                {{ usuario.display_name or usuario.username }}
            </a>

            <nav class="main-nav">
                <a href="/dashboard" class="active">Home</a>
                <a href="#">Forum</a>
                <a href="#">Manpages</a>
            </nav>
        </div>

        <div class="topbar-right">
            <a href="/dashboard" class="topbar-logo-link" aria-label="Página inicial do WikiDev">
                <img
                    src="/static/wikidev_logo.png"
                    alt="Logo do WikiDev"
                    class="topbar-logo"
                >
            </a>

            <button type="button" class="theme-toggle" aria-label="Alternar tema">
                ☀️
            </button>

            <button
                type="button"
                class="menu-hamburger"
                aria-label="Abrir ou fechar barra lateral"
                onclick="toggleSidebar()"
            >
                ≡
            </button>
        </div>
    </header>

    <div class="layout-container">
        <main class="main-content">
            <section id="welcome-panel" class="welcome-section">
                <h1>Bem-vindo ao Wikidev</h1>
                <p>Selecione um tópico na barra lateral para começar a ler ou editar.</p>
            </section>

            <div id="page-editor-container"></div>
        </main>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-actions">
                <button
                    type="button"
                    class="add-page-button"
                    hx-get="/pages/new"
                    hx-target="#page-editor-container"
                    hx-swap="innerHTML"
                    onclick="document.getElementById('welcome-panel').style.display = 'none';"
                > + Adicionar página
                </button>
            </div>

            <ul class="file-tree" id="pages-list">
                {% for page in pages %}
                    {% include "partials/page_item.html" %}
                {% endfor %}
            </ul>
        </aside>
    </div>

        <!-- O container principal precisa ter 'position: relative' -->
    <div id="search-container" style="position: relative; width: min(460px, 100%); margin: 20px auto 0; padding: 0 20px; z-index: 100;">
        <input
            type="search"
            name="q"
            placeholder="Buscar usuários ou páginas..."
            autocomplete="off"
            style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 10px; background-color: var(--bg-panel); color: var(--text-primary); box-shadow: 0 4px 14px rgba(0,0,0,0.18);"
            hx-get="/busca"
            hx-trigger="input changed delay:500ms, search"
            hx-target="#search-results"
        >

        <div
            id="search-results"
            style="position: absolute; top: calc(100% + 8px); left: 20px; right: 20px; background-color: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 10px 24px rgba(0,0,0,0.25); z-index: 200; overflow: hidden;"
        ></div>
    </div>

    <script>
        // Fecha os resultados da busca ao clicar fora do componente
        document.addEventListener('click', function(event) {
            const container = document.getElementById('search-container');
            const results = document.getElementById('search-results');
            
            // Se o clique não foi dentro do container de busca, esvaziamos a div de resultados
            if (container && !container.contains(event.target)) {
                results.innerHTML = '';
            }
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

    <script>
        function highlightCodeBlocks(root = document) {
            root.querySelectorAll("pre code").forEach((block) => {
                if (!block.dataset.highlighted) {
                    hljs.highlightElement(block);
                }
            });
        }

        document.addEventListener("DOMContentLoaded", function () {
            highlightCodeBlocks();
        });

        document.body.addEventListener("htmx:afterSwap", function (event) {
            highlightCodeBlocks(event.target);
        });
    </script>
</body>
</html>
