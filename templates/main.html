<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <title>Wikidev</title>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <div class="user-tag"><strong>usuario_dev</strong></div>
            
            <nav class="main-nav">
                <a href="#" class="active">Home</a>
                <a href="#">Forum</a>
                <a href="#">Manpages</a>
            </nav>
        </div>

        <div class="topbar-right">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Alternar Tema">☀️</button>
            
            <div class="menu-hamburger" onclick="toggleSidebar()" title="Recolher/Expandir Menu">≡</div>
        </div>
    </header>

    <div class="layout-container">
        
    <main class="main-content">
        <section id="welcome-panel">
            <h2>Bem-vindo ao Wikidev</h2>
            <br>
            <p style="color: var(--text-secondary)">Selecione um tópico na barra lateral para começar a ler ou editar.</p>
        </section>

        <form
            id="page-editor"
            class="page-editor hidden"
            hx-post="/pages/htmx"
            hx-target="#pages-list"
            hx-swap="afterbegin"
        >
            <div class="editor-top">
                <input
                    class="page-title"
                    name="title"
                    placeholder="Título da página"
                    required
                >

                <button type="button" class="settings-button" onclick="togglePageSettings()">
                    Configurações
                </button>
            </div>

            <div id="page-settings" class="page-settings hidden">
                <input name="summary" placeholder="Resumo">

                <select name="page_type">
                    <option value="personal">Personal</option>
                    <option value="official">Official</option>
                    <option value="question">Question</option>
                    <option value="example">Example</option>
                    <option value="note">Note</option>
                </select>

                <select name="status">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                    <option value="archived">Archived</option>
                </select>

                <input name="tag_ids" placeholder="Tags: 1,2,3">
            </div>

            <textarea
                class="page-content"
                name="content"
                placeholder="Escreva sua página aqui..."
            ></textarea>

            <button type="submit" class="save-page-button">Salvar página</button>
        </form>

    </main>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-actions">
            <button class="add-page-button" onclick="showPageEditor()"> + Adicionar página </button>
        </div>

        <ul class="file-tree" id="pages-list">
            <li><div class="folder-item">Pasta_1</div></li>
            <li><div class="folder-item">Pasta_2</div></li>
            <li><div class="folder-item">Pasta_3</div></li>
            <li><div class="folder-item">Pasta_4</div></li>
        </ul>
    </aside>

    </div>

</body>
</html>
