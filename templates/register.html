<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Criar conta - WikiDev</title>
    <link rel="icon" type="image/png" href="/static/wikidev_logo.png">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body class="auth-page">
    <button type="button" class="theme-toggle auth-theme-toggle">☀️</button>

    <main class="auth-shell">
        <section class="auth-card auth-card-large">
            <img
                src="/static/wikidev_logo.png"
                alt=""
                class="auth-logo"
                onerror="this.style.display='none'"
            >

            <h1>Criar conta</h1>
            <p class="auth-subtitle">
                Comece a montar sua wiki pessoal de programação.
            </p>

            <form
                method="post"
                action="/register"
                hx-post="/register"
                hx-target="#register-message"
                hx-swap="innerHTML"
                class="auth-form"
            >
                <label>
                    <span>Nome de usuário</span>
                    <input type="text" name="username" placeholder="Ex: exodus02" required>
                </label>

                <label>
                    <span>E-mail</span>
                    <input type="email" name="email" placeholder="seuemail@exemplo.com" required>
                </label>

                <label>
                    <span>Nome de exibição</span>
                    <input type="text" name="display_name" placeholder="Ex: exodus">
                </label>

                <label>
                    <span>Senha</span>
                    <input type="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                </label>

                <label>
                    <span>Confirme a senha</span>
                    <input type="password" name="password_confirm" placeholder="Repita sua senha" minlength="6" required>
                </label>

                <button type="submit" class="primary-button">Cadastrar</button>
            </form>

            <div id="register-message"></div>

            <p class="auth-inline-link">
                Já tem conta?
                <a href="/login">Entrar</a>
            </p>
        </section>
    </main>
</body>
</html>
